<!DOCTYPE html>
<html>
<head>
    <title>Raum beitreten</title>
</head>
<body>

<h2>Raum beitreten</h2>

<input id="roomInput" placeholder="Room ID">
<button onclick="joinRoom()">Beitreten</button>

<div id="chat"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onChildAdded }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwT6N2mREk_UpZSkNEL4EiXuaJiXI1P7I",
        authDomain: "screensharing-86355.firebaseapp.com",
        projectId: "screensharing-86355",
        storageBucket: "screensharing-86355.firebasestorage.app",
        messagingSenderId: "470446979255",
        appId: "1:470446979255:web:1f20a4e34208e7372db532"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let roomId;

    function listenRoom() {
        const messagesRef = ref(db, "rooms/" + roomId + "/messages");

        onChildAdded(messagesRef, (data) => {
            const div = document.createElement("div");
            div.innerText = data.val().text;
            document.getElementById("chat").appendChild(div);
        });

        // sofort "Hallo" senden
        push(messagesRef, {
            text: "Hallo",
            time: Date.now()
        });
    }

    window.joinRoom = function () {
        roomId = document.getElementById("roomInput").value;
        listenRoom();
    };
</script>

</body>
</html>
