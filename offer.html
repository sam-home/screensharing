<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>Offer</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; }
        button { padding: 10px 14px; margin: 5px; }
        textarea { width: 100%; height: 140px; font-family: monospace; }
        video { width: 100%; background: black; border-radius: 10px; margin-top: 10px; }
        #status { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<h1>📡 Offer (Streamer)</h1>

<button id="start">Share</button>

<div id="roomId"></div>

<div id="status">idle</div>

<video id="preview" autoplay muted playsinline></video>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwT6N2mREk_UpZSkNEL4EiXuaJiXI1P7I",
        authDomain: "screensharing-86355.firebaseapp.com",
        projectId: "screensharing-86355",
        databaseURL: "https://screensharing-86355-default-rtdb.europe-west1.firebasedatabase.app/",
        storageBucket: "screensharing-86355.firebasestorage.app",
        messagingSenderId: "470446979255",
        appId: "1:470446979255:web:1f20a4e34208e7372db532"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    const startBtn = document.getElementById("start");

    const roomIdDiv = document.getElementById("roomId");
    const statusEl = document.getElementById("status");
    const preview = document.getElementById("preview");

    pc.onconnectionstatechange = () => {
        statusEl.textContent = pc.connectionState;
    };

    pc.onicegatheringstatechange = () => {
        statusEl.textContent = "ICE: " + pc.iceGatheringState;
    };

    function generateId() {
        return Math.random().toString(36).substring(2, 8);
    }

    function waitIce(pc) {
        return new Promise(r => {
            if (pc.iceGatheringState === "complete") return r();
            pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === "complete") r();
            };
        });
    }

    startBtn.onclick = async () => {
        const stream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
            audio: true
        });

        preview.srcObject = stream;

        stream.getTracks().forEach(t => pc.addTrack(t, stream));

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        await waitIce(pc);

        const roomId = generateId();

        const roomRef = db.ref("rooms/" + roomId);

        roomRef.child("init").on("value", async (snap) => {
            if (snap.val() === null) {
                return;
            }

            await roomRef.child('offer').set(btoa(JSON.stringify(pc.localDescription)));

            await roomRef.child("init").remove();
        });

        roomRef.child("answer").on("value", async (snap) => {
            if (snap.val() === null) {
                return;
            }

            const answer = JSON.parse(atob(snap.val()));
            await pc.setRemoteDescription(answer);
            statusEl.textContent = "connected";

            await roomRef.child("finish").set(true);

            await roomRef.child("answer").remove();
        });

        roomIdDiv.innerText = roomId;
    };
</script>

</body>
</html>
