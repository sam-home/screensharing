<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>WebRTC Viewer</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; }
        textarea { width: 100%; height: 140px; font-family: monospace; }
        button { padding: 10px 14px; margin-top: 10px; }
        video { width: 100%; margin-top: 15px; background: black; border-radius: 10px; }
        #status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<h1>👀 Viewer</h1>

<button id="connectBtn">connect</button>

<div id="status">idle</div>

<video id="video" autoplay playsinline controls></video>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwT6N2mREk_UpZSkNEL4EiXuaJiXI1P7I",
        authDomain: "screensharing-86355.firebaseapp.com",
        projectId: "screensharing-86355",
        databaseURL: "https://screensharing-86355-default-rtdb.europe-west1.firebasedatabase.app/",
        storageBucket: "screensharing-86355.firebasestorage.app",
        messagingSenderId: "470446979255",
        appId: "1:470446979255:web:1f20a4e34208e7372db532"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    const connectBtn = document.getElementById("connectBtn");
    const statusEl = document.getElementById("status");
    const video = document.getElementById("video");

    pc.ontrack = (e) => {
        video.srcObject = e.streams[0];
    };

    connectBtn.onclick = async (e) => {
        const params = new URLSearchParams(window.location.search);
        const roomId = params.get("roomId");

        const roomRef = db.ref("rooms/" + roomId);

        roomRef.child("offer").on("value", async (snap) => {
            if (snap.val() === null) {
                return;
            }

            const offer = JSON.parse(atob(snap.val()));

            await pc.setRemoteDescription(offer);

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            statusEl.textContent = "gathering ICE...";

            await waitIceComplete(pc);

            await roomRef.child('answer').set(btoa(JSON.stringify(pc.localDescription)));

            await roomRef.child("offer").remove();
        });

        roomRef.child("finish").on("value", async (snap) => {
            if (snap.val() === null) {
                return;
            }

            statusEl.textContent = "connected";

            await roomRef.child("finish").remove();
        });

        await roomRef.child("init").set(true);
    }

    function waitIceComplete(pc) {
        return new Promise(resolve => {
            if (pc.iceGatheringState === "complete") return resolve();

            pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === "complete") resolve();
            };
        });
    }
</script>

</body>
</html>
