<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>WebRTC Viewer</title>

    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; }
        textarea { width: 100%; height: 140px; font-family: monospace; }
        button { padding: 10px 14px; margin-top: 10px; }
        video { width: 100%; margin-top: 15px; background: black; border-radius: 10px; }
        #status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<h1>👀 Viewer</h1>

<textarea id="offerInput" placeholder="Offer hier einfügen..."></textarea>
<button id="connect">Verbinden</button>

<div id="status">idle</div>

<video id="video" autoplay playsinline controls></video>

<textarea id="answerBox" readonly placeholder="Answer erscheint hier..."></textarea>
<button id="copy" disabled>Answer kopieren</button>

<script>
    const pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    const offerInput = document.getElementById("offerInput");
    const answerBox = document.getElementById("answerBox");
    const statusEl = document.getElementById("status");
    const video = document.getElementById("video");
    const copyBtn = document.getElementById("copy");

    pc.ontrack = (e) => {
        video.srcObject = e.streams[0];
    };

    function waitIceComplete(pc) {
        return new Promise(resolve => {
            if (pc.iceGatheringState === "complete") return resolve();

            pc.onicegatheringstatechange = () => {
                if (pc.iceGatheringState === "complete") resolve();
            };
        });
    }

    document.getElementById("connect").onclick = async () => {
        const offer = JSON.parse(atob(offerInput.value.trim()));

        await pc.setRemoteDescription(offer);

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        statusEl.textContent = "gathering ICE...";

        await waitIceComplete(pc);

        answerBox.value = btoa(JSON.stringify(pc.localDescription));

        statusEl.textContent = "ready (copy answer)";
        copyBtn.disabled = false;
    };

    copyBtn.onclick = async () => {
        await navigator.clipboard.writeText(answerBox.value);
        alert("Answer kopiert");
    };
</script>

</body>
</html>
